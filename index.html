<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Massachusetts Weather Alerts</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 10px;
            background-color: #f5f5f5;
        }

        h2 {
            text-align: center;
            margin-bottom: 15px;
        }

        .alert {
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            color: white;
        }

        .warning {
            background-color: #d32f2f;
        }

        .watch {
            background-color: #f57c00;
        }

        .advisory {
            background-color: #fbc02d;
            color: black;
        }

        .info {
            background-color: #388e3c;
        }

        .event {
            font-size: 18px;
            font-weight: bold;
        }

        .headline {
            margin-top: 5px;
        }
    </style>
</head>
<body>

<h2>Massachusetts Weather Alerts</h2>

<div id="alerts">
    Loading alerts...
</div>

<script>
async function loadAlerts() {
    const container = document.getElementById("alerts");

    try {
        const response = await fetch(
            "https://api.weather.gov/alerts/active?area=MA"
        );

        const data = await response.json();

        container.innerHTML = "";

        if (data.features.length === 0) {
            container.innerHTML = `
                <div class="alert info">
                    No active watches, warnings, or advisories in Massachusetts.
                </div>
            `;
            return;
        }

        data.features.forEach(alert => {
            const props = alert.properties;

            let category = "advisory";

            if (props.event.includes("Warning")) {
                category = "warning";
            } else if (props.event.includes("Watch")) {
                category = "watch";
            }

            const div = document.createElement("div");
            div.className = `alert ${category}`;

            div.innerHTML = `
                <div class="event">${props.event}</div>
                <div class="headline">${props.headline}</div>
                <div>${props.areaDesc}</div>
            `;

            container.appendChild(div);
        });

    } catch (error) {
        container.innerHTML = `
            <div class="alert warning">
                Unable to retrieve weather alerts.
            </div>
        `;
    }
}

loadAlerts();
setInterval(loadAlerts, 300000);
</script>

</body>
</html>
